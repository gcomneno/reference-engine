name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling and development dependencies
        run: |
          python -m pip install --upgrade pip "setuptools>=68" wheel
          python -m pip install ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Run lint
        run: ruff check .

      - name: Run typing
        run: python -m mypy

      - name: Build wheel
        run: python -m pip wheel . --no-deps --no-build-isolation --wheel-dir dist

      - name: Verify wheel contents
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheels = list(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one wheel, found {len(wheels)}")

          wheel = wheels[0].resolve()
          required = {
              "reference_engine/resources/migrations/__init__.py",
              "reference_engine/resources/migrations/001_initial_schema.sql",
          }
          with ZipFile(wheel) as archive:
              missing = required.difference(archive.namelist())
          if missing:
              raise SystemExit(f"wheel is missing: {', '.join(sorted(missing))}")
          PY
